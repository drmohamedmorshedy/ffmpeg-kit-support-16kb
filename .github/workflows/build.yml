name: Build FFmpegKit

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Make scripts executable
        run: |
          chmod +x android.sh
          find . -name "*.sh" -exec chmod +x {} \;

      - name: Build FFmpegKit
        run: |
          ./android.sh \
            --enable-openssl \
            --enable-srt \
            --enable-gmp \
            --enable-libiconv \
            --enable-libxml2 \
            --enable-android-media-codec \
            --enable-android-zlib \
            --disable-arm-v7a \
            --disable-x86 \
            --disable-x86-64 \
            --api-level=28

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            **/build.log
            **/*.log
            logs/**
            prebuilt/**

      - name: Upload AAR
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-kit-aar
          path: |
            built-aar/**
            prebuilt/**
            **/*.aar
